name: Generate Sitemap
on:
  push:
    branches: [main]
jobs:
  sitemap_job:
    runs-on: ubuntu-latest
    name: Generate a sitemap
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Generate the sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://github.io
